<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" fill="none" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7d8278" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#9aa094" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="ink2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5d6358" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#9aa094" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- 远山（淡）-->
  <path d="M0 320 Q 100 200 220 270 Q 320 220 420 290 Q 540 240 700 310 L 700 500 L 0 500 Z"
        fill="url(#ink)" opacity="0.5"/>

  <!-- 中山（中浓）-->
  <path d="M120 360 Q 220 240 320 320 Q 380 260 460 320 Q 560 270 700 340 L 700 500 L 120 500 Z"
        fill="url(#ink2)" opacity="0.7"/>

  <!-- 近山（浓）-->
  <path d="M280 420 Q 340 320 420 380 Q 500 320 580 380 Q 640 350 700 400 L 700 500 L 280 500 Z"
        fill="#5d6358" opacity="0.55"/>

  <!-- 松树点缀 -->
  <g stroke="#3d4338" stroke-width="1.2" opacity="0.7" stroke-linecap="round">
    <path d="M540 380 v-30"/><path d="M540 360 l-8 -10 l8 5 l8 -5 l-8 10"/>
    <path d="M580 395 v-25"/><path d="M580 380 l-7 -8 l7 4 l7 -4 l-7 8"/>
    <path d="M610 405 v-20"/>
    <path d="M520 400 v-22"/>
  </g>

  <!-- 雾气线条 -->
  <g stroke="#a8aea2" stroke-width="0.8" fill="none" opacity="0.5">
    <path d="M260 350 q 60 -10 120 0"/>
    <path d="M380 390 q 80 -8 160 0"/>
  </g>
</svg>
