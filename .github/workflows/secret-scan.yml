name: secret-scan

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          set -euo pipefail
          mkdir -p /tmp/gitleaks
          url="$(curl -fsSL https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | jq -r '.assets[] | select(.name | test("gitleaks_.*_linux_x64[.]tar[.]gz$")) | .browser_download_url' \
            | head -n 1)"
          test -n "$url"
          curl -fsSL "$url" -o /tmp/gitleaks/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks/gitleaks.tar.gz -C /tmp/gitleaks gitleaks
          sudo install -m 0755 /tmp/gitleaks/gitleaks /usr/local/bin/gitleaks
      - name: Install trufflehog
        run: |
          set -euo pipefail
          mkdir -p /tmp/trufflehog
          url="$(curl -fsSL https://api.github.com/repos/trufflesecurity/trufflehog/releases/latest \
            | jq -r '.assets[] | select(.name | test("trufflehog_.*_linux_amd64[.]tar[.]gz$")) | .browser_download_url' \
            | head -n 1)"
          test -n "$url"
          curl -fsSL "$url" -o /tmp/trufflehog/trufflehog.tar.gz
          tar -xzf /tmp/trufflehog/trufflehog.tar.gz -C /tmp/trufflehog trufflehog
          sudo install -m 0755 /tmp/trufflehog/trufflehog /usr/local/bin/trufflehog
      - name: Gitleaks
        run: gitleaks detect --source . --no-git --redact
      - name: TruffleHog
        run: trufflehog filesystem . --only-verified --no-update
      - name: Custom denylist
        run: scripts/guardrails-secret-scan.sh
