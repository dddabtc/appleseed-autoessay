name: secret-scan

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          tag="$(gh release view --repo gitleaks/gitleaks --json tagName --jq .tagName)"
          gh release download "$tag" --repo gitleaks/gitleaks \
            --pattern 'gitleaks_*_linux_x64.tar.gz' --dir /tmp/gitleaks --clobber
          tar -xzf /tmp/gitleaks/gitleaks_*_linux_x64.tar.gz -C /tmp/gitleaks gitleaks
          sudo install -m 0755 /tmp/gitleaks/gitleaks /usr/local/bin/gitleaks
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Install trufflehog
        run: |
          tag="$(gh release view --repo trufflesecurity/trufflehog --json tagName --jq .tagName)"
          gh release download "$tag" --repo trufflesecurity/trufflehog \
            --pattern 'trufflehog_*_linux_amd64.tar.gz' --dir /tmp/trufflehog --clobber
          tar -xzf /tmp/trufflehog/trufflehog_*_linux_amd64.tar.gz -C /tmp/trufflehog trufflehog
          sudo install -m 0755 /tmp/trufflehog/trufflehog /usr/local/bin/trufflehog
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Gitleaks
        run: gitleaks detect --source . --no-git --redact
      - name: TruffleHog
        run: trufflehog filesystem . --only-verified --no-update
      - name: Custom denylist
        run: scripts/guardrails-secret-scan.sh
